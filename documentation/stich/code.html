                            <p className="font-body-md text-body-md text-on-surface-variant">Juz 8, Page 142</p>
                        </div>
                    </div>
                    
                    <div className="md:col-span-8 bg-surface-container-lowest rounded-xl p-md border border-primary-container/15 flex flex-col justify-between">
                        <div className="flex justify-between items-start mb-md">
                            <div>
                                <h3 className="font-label-sm text-label-sm text-secondary uppercase tracking-wider mb-xs">Continue Reading</h3>
                                <h2 className="font-h2 text-h2 text-primary">Surah Al-A'raf</h2>
                                <p className="font-body-md text-body-md text-on-surface-variant">Verses 1-10</p>
                            </div>
                            <div className="bg-primary-container/10 p-sm rounded-full text-primary">
                                <span className="material-symbols-outlined text-3xl">menu_book</span>
                            </div>
                        </div>
                        <div className="space-y-sm">
                            <div className="w-full bg-surface-variant rounded-full h-2 overflow-hidden">
                                <div className="bg-primary-container h-full" style={{width: '45%'}}></div>
                            </div>
                            <div className="flex justify-between text-on-surface-variant font-label-sm text-label-sm">
                                <span>Daily Goal: 5 Pages</span>
                                <span>2 / 5 Pages</span>
                            </div>
                        </div>
                        <div className="mt-md flex justify-end">
                            <button className="bg-primary text-on-primary px-container-padding py-sm rounded-lg font-label-sm text-label-sm hover:bg-surface-tint transition-colors shadow-[0_4px_20px_0_rgba(139,168,136,0.08)]">
                                Continue
                            </button>
                        </div>
                    </div>
                </section>

                <section className="grid grid-cols-2 md:grid-cols-4 gap-gutter">
                    {['bookmarks', 'favorite', 'headset', 'history'].map(icon => (
                        <button key={icon} className="bg-surface-container-lowest border border-primary-container/15 rounded-xl p-md flex flex-col items-center justify-center space-y-sm hover:bg-surface-container-low transition-colors">
                            <span className="material-symbols-outlined text-primary text-3xl">{icon}</span>
                            <span className="font-label-sm text-label-sm text-on-surface capitalize">{icon}</span>
                        </button>
                    ))}
                </section>
                
                <section className="space-y-md">
                    <h3 className="font-h3 text-h3 text-primary">Surahs</h3>
                    <div className="bg-surface-container-lowest rounded-xl border border-primary-container/15 overflow-hidden">
                        {[
                            {id: 1, name: 'Al-Fatihah', eng: 'The Opener', verses: 7, arabic: 'الفاتحة'},
                            {id: 2, name: 'Al-Baqarah', eng: 'The Cow', verses: 286, arabic: 'البقرة'},
                        ].map(surah => (
                            <div key={surah.id} className="flex items-center justify-between p-md border-b border-primary-container/10 hover:bg-surface-container-low transition-colors cursor-pointer group">
                                <div className="flex items-center space-x-md">
                                    <div className="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center font-label-sm text-label-sm text-primary group-hover:bg-primary-container/20">
                                        {surah.id}
                                    </div>
                                    <div>
                                        <h4 className="font-label-sm text-label-sm text-on-surface">{surah.name}</h4>
                                        <p className="font-body-md text-body-md text-on-surface-variant text-sm">{surah.eng} • {surah.verses} Verses</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <h4 className="font-h3 text-h3 text-primary text-xl">{surah.arabic}</h4>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            </div>
        );

        const App = () => {
            const getTitle = (path) => {
                switch(path) {
                    case '/': return 'Amaly';
                    case '/quran': return 'Quran';
                    case '/fasting': return 'SoulFast';
                    case '/cycle': return 'Amaly';
                    default: return 'Amaly';
                }
            };

            const location = useLocation();

            return (
                <div className="flex flex-col min-h-screen">
                    <Header title={getTitle(location.pathname)} />
                    <div className="flex-1 overflow-y-auto">
                        <Routes>
                            <Route path="/" element={<DailyHome />} />
                            <Route path="/fasting" element={<FastingTracker />} />
                            <Route path="/cycle" element={<CycleTracker />} />
                            <Route path="/quran" element={<QuranTracker />} />
                        </Routes>
                    </div>
                    <BottomNav />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>
</html>
